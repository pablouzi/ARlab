<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dron de Exploración AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- Importamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      .loading-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.9); color: white; display: flex;
        flex-direction: column; justify-content: center; align-items: center;
        z-index: 9999; transition: opacity 0.5s ease;
      }
      .instructions-ui {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8); color: #00ffcc; padding: 12px 24px;
        border-radius: 24px; font-weight: bold; font-size: 14px;
        pointer-events: none; text-align: center; border: 1px solid #00ffcc;
        z-index: 999;
      }
    </style>
  </head>

  <body>
    <!-- Pantalla de Carga -->
    <div id="loader" class="loading-overlay">
      <h2 style="margin: 0; font-size: 24px; letter-spacing: 1px;">AR WebApp Studio</h2>
      <p style="color: #94a3b8; font-size: 14px; margin-top: 8px;">Cargando cámara y assets 3D...</p>
    </div>

    <!-- UI de instrucciones -->
    <div class="instructions-ui">
      Apunta tu cámara al marcador Personalizado
    </div>

    <!-- Escena AR -->
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;">
      
      <!-- Listado de recursos/assets multimedia -->
      <a-assets>
        <!-- Reemplaza src con la ruta real de tu archivo .glb -->
        <a-asset-item id="modelo-ar" src="mi-modelo-3d.glb"></a-asset-item>
        
        <!-- Capas de Texturizado (Descomenta y cambia las rutas para usarlas) -->
        <!-- 
        <!-- <img id="textura-base" src="textures/base_map.png"> -->
        <!-- <img id="textura-normal" src="textures/normal_map.png"> -->
        <!-- <img id="textura-roughness" src="textures/roughness_map.png"> -->
        -->
      </a-assets>

      <!-- Definición de Marcador -->
      <!-- Marcador Personalizado. Asegúrate de compilar el .patt y configurarlo aquí -->
      <a-marker type="pattern" url="custom-marker.patt" id="marcador-principal">

        <!-- Entidad contenedora del modelo con transforms, colores y materiales -->
        <a-entity 
          id="modelo-entidad"
          gltf-model="#modelo-ar"
          position="0 0.1 0"
          rotation="0 0 0"
          scale="1.1 1.1 1.1"
          material="color: #ffffff; roughness: 0.25; metalness: 0.85; opacity: 1; emissive: #00f2ff; emissiveIntensity: 0.8;"
          shadow="cast: true; receive: true">
        </a-entity>

      </a-marker>

      <!-- Cámara AR -->
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Desvanecer la pantalla de carga cuando los elementos estén listos
      window.addEventListener('load', () => {
        const loader = document.getElementById('loader');
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.style.display = 'none', 500);
        }, 1000);
      });

      // ---- SCRIPT PERSONALIZADO DE COMPORTAMIENTO ----
      const model = document.querySelector('#modelo-entidad');
      const marker = document.querySelector('#marcador-principal');
      
      // Auxiliares para callbacks del usuario
      let updateCallbacks = [];
      let clickCallbacks = [];

      function onUpdate(cb) {
        updateCallbacks.push(cb);
      }

      function onClick(cb) {
        clickCallbacks.push(cb);
      }

      // Registro el evento tap/click
      model.addEventListener('click', (e) => {
        clickCallbacks.forEach(cb => cb());
      });

      // Loop de actualización por cada frame (deltaTime aproximado)
      let lastTime = performance.now();
      function tick() {
        requestAnimationFrame(tick);
        const currentTime = performance.now();
        const deltaTime = (currentTime - lastTime) / 1000;
        lastTime = currentTime;

        updateCallbacks.forEach(cb => cb(deltaTime));
      }
      requestAnimationFrame(tick);

      // --- Inyección del código generado por el usuario ---
      // Inyecta controladores dinámicos aquí de manera sencilla
let deg = 0;
onUpdate((deltaTime) => {
  deg += 36 * deltaTime; // 36 grados por segundo
  model.setAttribute('rotation', `0 ${deg} 0`);
});
    </script>
  </body>
</html>
