<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Experience</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script><script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script><script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:sans-serif}#start-screen{position:fixed;inset:0;z-index:100;background:#050810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;text-align:center;padding:28px}#start-screen h1{font-size:22px;font-weight:700;background:linear-gradient(90deg,#00d4ff,#7b5ea7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}#start-screen p{font-size:13px;color:rgba(255,255,255,.5);max-width:300px;line-height:1.7}#start-btn{padding:14px 38px;background:linear-gradient(135deg,#00d4ff,#0099cc);color:#000;font-weight:800;font-size:15px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 30px rgba(0,212,255,.5)}#tip{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;background:rgba(0,0,0,.85);color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;z-index:50;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);white-space:nowrap}.mindar-ui-overlay{pointer-events:none;}.ar-ui{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:9999;max-width:90vw;overflow-x:auto;padding:12px 16px;background:rgba(20,20,25,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:24px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.3);scrollbar-width:none;}.ar-ui::-webkit-scrollbar{display:none;}.ar-btn{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}.ar-btn.active{background:rgba(0,212,255,0.15);color:#00d4ff;border-color:rgba(0,212,255,0.4);box-shadow:0 0 15px rgba(0,212,255,0.2);}.ar-btn:active{transform:scale(0.95);}.ar-btn-stop{color:#ff6b6b;border-color:rgba(255,107,107,0.2);}.ar-btn-stop:hover{background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.4);}</style>
</head>
<body>
<div id="start-screen">
  <div style="font-size:52px">&#x1F4E6;</div>
  <h1>AR Experience</h1>
  <p>Seguimiento de imagen con MindAR</p>
  <button id="start-btn" onclick="startAR()">Iniciar AR</button>
  <p style="font-size:10px;color:rgba(255,255,255,.2)">localhost o HTTPS</p>
</div>
<div class="ar-ui">
  <button class="ar-btn anim-toggle" data-clip="tapa" onclick="toggleAnim(this, 'tapa')">tapa</button>
  <button class="ar-btn anim-toggle active" data-clip="hojas" onclick="toggleAnim(this, 'hojas')">hojas</button>
  <button class="ar-btn ar-btn-stop" onclick="stopAnim()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px;margin-top:-2px"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>Detener</button>
</div>
<div id="tip">Apunta al target para ver el modelo 3D</div>
<script>
var _s=false;
function startAR(){
  if(_s)return;_s=true;
  if(location.protocol==='file:'){alert('Abre desde http://localhost:8080/ar-experience.html');_s=false;return;}
  var ss=document.getElementById('start-screen');if(ss)ss.style.display='none';
    var scene = document.createElement('a-scene');
    scene.setAttribute('mindar-image', 'imageTargetSrc: assets/targets.mind; filterMinCF: 0.001; filterBeta: 10;');
    scene.setAttribute('color-space', 'sRGB');
    scene.setAttribute('renderer', 'colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic;');
    scene.setAttribute('vr-mode-ui', 'enabled: false');
    scene.setAttribute('device-orientation-permission-ui', 'enabled: false');
    scene.innerHTML =
      '<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>' +
      '<a-entity mindar-image-target="targetIndex: 0"><a-entity gltf-model=\"assets/model.glb\" position=\"0.000 0.000 0.000\" rotation=\"90.00 0.00 0.00\" scale=\"0.310 0.310 0.310\" shadow=\"cast: true; receive: true\" ar-anim-controller></a-entity></a-entity>';
    scene.setAttribute('light','defaultLightsEnabled: false');
    [{"t":"ambient","c":"#ffffff","i":0.6},{"t":"directional","c":"#ffffff","i":3,"p":"3 -6.5 3","s":true},{"t":"directional","c":"#00d4ff","i":0.3,"p":"-3 2 -3"},{"t":"directional","c":"#7b5ea7","i":0.4,"p":"0 -2 -4"}].forEach(function(l){var e=document.createElement('a-light');e.setAttribute('type',l.t);e.setAttribute('color',l.c);e.setAttribute('intensity',l.i);if(l.p)e.setAttribute('position',l.p);if(l.s){e.setAttribute('cast-shadow','true');e.setAttribute('shadow-map-width','2048');e.setAttribute('shadow-map-height','2048');e.setAttribute('shadow-camera-near','0.1');e.setAttribute('shadow-camera-far','25');e.setAttribute('shadow-camera-left','-4');e.setAttribute('shadow-camera-right','4');e.setAttribute('shadow-camera-top','4');e.setAttribute('shadow-camera-bottom','-4');}scene.appendChild(e);});
    document.body.appendChild(scene);
    scene.addEventListener('loaded', function(){var t=document.getElementById('tip');if(t)t.style.display='block';});
  setTimeout(function(){var t=document.getElementById('tip');if(t){t.style.opacity='0';t.style.transition='opacity .5s';}},9000);
}

AFRAME.registerComponent('ar-anim-controller', {
  init: function() {
    this.mixer = null;
    this.actions = {};
    this.el.addEventListener('model-loaded', () => {
      const mesh = this.el.getObject3D('mesh');
      if (mesh && mesh.animations && mesh.animations.length > 0) {
        this.mixer = new THREE.AnimationMixer(mesh);
        mesh.animations.forEach(clip => {
          const action = this.mixer.clipAction(clip);
          action.play();
          action.paused = true;
          this.actions[clip.name] = action;
        });
        document.querySelectorAll('.ar-btn.anim-toggle.active').forEach(b => {
          const n = b.getAttribute('data-clip');
          if (this.actions[n]) this.actions[n].paused = false;
        });
      }
    });
  },
  tick: function(t, dt) {
    if (this.mixer) this.mixer.update(dt / 1000);
  },
  toggle: function(name, active) {
    const action = this.actions[name];
    if (action) {
      if (active && !action.isRunning()) { action.reset(); action.play(); }
      action.paused = !active;
    }
  },
  stopAll: function() {
    Object.values(this.actions).forEach(action => {
      action.paused = true;
      action.reset();
    });
  }
});

function toggleAnim(btn, n) {
  var e = document.querySelector("[gltf-model]");
  if (!e || !e.components['ar-anim-controller']) return;
  btn.classList.toggle('active');
  var isActive = btn.classList.contains('active');
  e.components['ar-anim-controller'].toggle(n, isActive);
}

function stopAnim() {
  var e = document.querySelector("[gltf-model]");
  if (!e || !e.components['ar-anim-controller']) return;
  document.querySelectorAll(".ar-btn.anim-toggle").forEach(b => b.classList.remove("active"));
  e.components['ar-anim-controller'].stopAll();
}</script>
</body>
</html>
